
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070f;--bg2:#090d1a;--bg3:#0e1220;--bg4:#131828;
  --b1:#1a2238;--b2:#243050;--b3:#334470;
  --t1:#d6e4ff;--t2:#8aa4d8;--t3:#3d5280;--t4:#1e2e50;
  --g:#00ffb3;--gbg:rgba(0,255,179,0.07);--gbr:rgba(0,255,179,0.25);
  --a:#ffb347;--abg:rgba(255,179,71,0.07);--abr:rgba(255,179,71,0.25);
  --p:#7b8fff;--pbg:rgba(123,143,255,0.07);--pbr:rgba(123,143,255,0.25);
  --r:#ff4d6d;
  --milan:#00ffb3;--paris:#7b8fff;--london:#ffb347;
  --mono:'JetBrains Mono',monospace;
  --radius:6px;
}

/* ── BASE ── */
body{background:var(--bg);color:var(--t1);font-family:var(--mono);font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,255,179,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.app{padding:24px 28px;position:relative;z-index:1;max-width:1800px;margin:0 auto}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--b1)}
.brand-wrap{display:flex;align-items:center;gap:16px}
.brand-icon{width:44px;height:44px;flex-shrink:0}
.brand-text{}
.brand{font-size:22px;font-weight:700;letter-spacing:3px;line-height:1;display:flex;align-items:baseline;gap:8px}
.brand .tx{color:var(--g)}
.brand .byline{font-size:11px;font-weight:400;letter-spacing:5px;color:var(--t3);margin-left:4px;align-self:center}
.sub{font-size:11px;color:var(--t3);letter-spacing:3px;margin-top:5px}
.hdr-right{text-align:right}
.hdr-clock-row{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.hdr-clock-line{font-size:13px;color:var(--t2);letter-spacing:1px;display:flex;align-items:center;gap:8px}
.hdr-clock-line .clk-lbl{font-size:10px;color:var(--t3);letter-spacing:3px;min-width:34px;text-align:right}
.hdr-clock-line .clk-val{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:2px}
.hdr-clock-line.date-row .clk-val{color:var(--g);font-size:13px}

/* ── CONTROLS ── */
.ctrl{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.clbl{font-size:11px;color:var(--t3);letter-spacing:3px;margin-right:4px}
.mbtn{font-size:11px;padding:9px 20px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;border-radius:var(--radius);letter-spacing:1px;font-family:var(--mono);transition:all .15s;font-weight:500}
.mbtn:hover{color:var(--t2);border-color:var(--b3);background:var(--bg3)}
.mbtn.on.m8{background:var(--g);border-color:var(--g);color:#001a0f;font-weight:700}
.mbtn.on.m12{background:var(--a);border-color:var(--a);color:#1a0d00;font-weight:700}
.mbtn.on.mlive{background:var(--p);border-color:var(--p);color:#05001a;font-weight:700}
.fbtn{margin-left:auto;font-size:12px;padding:9px 26px;border:1px solid var(--g);background:var(--gbg);color:var(--g);cursor:pointer;border-radius:var(--radius);letter-spacing:3px;font-family:var(--mono);font-weight:700;transition:all .15s;position:relative;overflow:hidden}
.fbtn::before{content:'';position:absolute;inset:0;background:var(--g);opacity:0;transition:opacity .15s}
.fbtn:hover::before{opacity:0.08}
.fbtn:hover{box-shadow:0 0 20px rgba(0,255,179,0.2);letter-spacing:4px}
.fbtn:disabled{opacity:.3;cursor:not-allowed}

/* ── CITY TABS ── */
.ctabs{display:flex;margin-bottom:18px;border-bottom:1px solid var(--b1);gap:2px}
.ctab{font-size:12px;padding:11px 24px;border:none;background:transparent;color:var(--t3);cursor:pointer;letter-spacing:3px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--mono);font-weight:500}
.ctab:hover{color:var(--t2);background:rgba(255,255,255,0.02)}
.ctab.am{color:var(--milan);border-bottom-color:var(--milan)}
.ctab.ap{color:var(--paris);border-bottom-color:var(--paris)}
.ctab.al{color:var(--london);border-bottom-color:var(--london)}

/* ── PANEL ── */
.panel{display:none}.panel.show{display:block}

/* ── CITY META ── */
.city-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:16px 20px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius);gap:20px}
.cm-iata{font-size:30px;font-weight:700;letter-spacing:5px;line-height:1}
.cm-loc{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:1px}
.cm-ltime{font-size:26px;font-weight:600;text-align:center;letter-spacing:2px}
.cm-date{font-size:12px;color:var(--g);text-align:center;margin-top:4px;letter-spacing:2px;font-weight:500}
.cm-tz{font-size:11px;color:var(--t3);text-align:center;margin-top:3px;letter-spacing:2px}
.cm-slotlbl{font-size:12px;font-weight:600;text-align:right;letter-spacing:2px}
.cm-ist{font-size:11px;color:var(--t3);text-align:right;margin-top:4px}

/* ── MODEL PILLS ── */
.mbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.mpill{font-size:11px;padding:4px 12px;border:1px solid var(--b2);border-radius:4px;color:var(--t3);letter-spacing:1px}
.mpill.top{font-weight:700}

/* ── SECTION HEADERS ── */
.sec-hdr{font-size:11px;color:var(--t3);letter-spacing:4px;margin:20px 0 12px;display:flex;align-items:center;gap:10px;font-weight:500}
.sec-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--b2),transparent)}
.sec-hdr:first-child{margin-top:0}

/* ── VARIABLE TABS ── */
.sline{font-size:11px;color:var(--t3);margin-bottom:12px;letter-spacing:1px}
.vtabs{display:flex;gap:6px;margin-bottom:12px}
.vtab{font-size:11px;padding:7px 18px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;border-radius:var(--radius);letter-spacing:2px;font-family:var(--mono);transition:all .15s;font-weight:500}
.vtab:hover{color:var(--t2);border-color:var(--b2);background:var(--bg3)}
.vtab.on{background:var(--bg3);color:var(--t1);border-color:var(--b2);font-weight:600}

/* ── FORECAST TABLE ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--b1);border-radius:var(--radius);margin-bottom:8px;background:var(--bg2)}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;color:var(--t3);padding:10px 10px;text-align:center;border-bottom:1px solid var(--b1);background:var(--bg3);letter-spacing:1px;white-space:nowrap;font-weight:500}
thead th:first-child{text-align:left;min-width:110px;padding-left:14px;position:sticky;left:0;z-index:3;background:var(--bg3)}
thead th.cur{border-bottom-width:2px;font-weight:700;color:var(--t1)}
thead th.past-h{color:#8a6200!important;background:rgba(0,0,0,.25)!important}
tbody tr{border-bottom:1px solid var(--b1)}
tbody tr:last-child{border-bottom:none}
tbody tr.toprow td{background:rgba(255,255,255,0.015)}
tbody tr.toprow td:first-child{background:var(--bg2)}
tbody tr:hover td{background:rgba(255,255,255,0.018)}
tbody td{padding:9px 10px;font-size:13px;text-align:center;color:var(--t1);white-space:nowrap;transition:background .1s}
tbody td:first-child{text-align:left;font-size:12px;color:var(--t2);padding-left:14px;font-weight:500;position:sticky;left:0;z-index:2;background:var(--bg2)}
tbody td.topmod{font-weight:700}
tbody td.na{color:var(--t4);font-size:11px}
tbody td.past-v{color:#c8920a!important;font-style:italic}
tbody tr.avgrow td{background:var(--bg3);font-size:13px;color:var(--t2);border-top:1px solid var(--b2)}
tbody tr.avgrow td:first-child{color:var(--t3);font-size:11px;letter-spacing:3px;padding-left:14px;position:sticky;left:0;z-index:2;background:var(--bg3)}
tbody tr.updrow td{background:var(--bg2);font-size:10px;color:var(--t3);border-top:1px solid var(--b1);padding:5px 10px 6px}
tbody tr.updrow td:first-child{letter-spacing:1px;padding-left:14px;color:var(--t4)}

/* ── LOW / HIGH BOX ── */
.lh-box{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;position:relative}
.lh-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(0,255,179,0.3),transparent)}
.lh-hdr{font-size:11px;color:var(--t3);letter-spacing:4px;padding:12px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;font-weight:500;background:var(--bg3)}
.lh-mode-tag{font-size:10px;padding:3px 10px;border-radius:4px;font-weight:700;letter-spacing:1px}
.lh-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.lh-cell{padding:24px 28px;border-right:1px solid var(--b1);position:relative}
.lh-cell:last-child{border-right:none}
.lh-label{font-size:10px;color:var(--t3);letter-spacing:4px;margin-bottom:10px;font-weight:500;text-transform:uppercase}
.lh-val{font-size:52px;font-weight:700;letter-spacing:1px;line-height:1;display:flex;align-items:baseline;gap:4px}
.lh-val .lh-unit{font-size:24px;font-weight:400;opacity:0.7;margin-left:2px}
.lh-sub{font-size:11px;color:var(--t3);margin-top:10px;line-height:1.6}
.lh-metar-badge{font-size:10px;padding:3px 9px;border-radius:4px;background:var(--gbg);border:1px solid var(--gbr);color:var(--g);margin-left:6px;vertical-align:middle;font-weight:600}
.lh-conf{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 12px;border-radius:4px;margin-top:10px;font-weight:700;letter-spacing:2px}
.lh-conf::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.lh-na{font-size:13px;color:var(--t3);padding:24px;letter-spacing:1px}
.lh-divider{position:absolute;top:50%;right:0;transform:translateY(-50%);width:1px;height:60%;background:linear-gradient(to bottom,transparent,var(--b2),transparent)}

/* ── MODEL UPDATES ── */
.model-updates{margin-bottom:16px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden}
.mu-hdr{font-size:11px;color:var(--t3);letter-spacing:2px;padding:10px 16px;border-bottom:1px solid var(--b1);background:var(--bg3)}
.mu-grid{display:flex;flex-wrap:wrap;gap:0}
.mu-item{padding:10px 16px;border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);min-width:180px}
.mu-item:last-child{border-right:none}
.mu-label{font-size:10px;color:var(--t3);letter-spacing:2px;font-weight:500}
.mu-time{font-size:12px;color:var(--t1);margin-top:4px;font-weight:600}
.mu-age{font-size:10px;color:var(--t3);margin-top:2px}

/* ── METAR ── */
.metar-section{margin-bottom:18px}
.metar-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden;margin-bottom:5px}
.metar-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .12s;user-select:none}
.metar-hdr:hover{background:var(--bg3)}
.m-badge{font-size:10px;padding:3px 9px;border-radius:3px;font-weight:700;flex-shrink:0;letter-spacing:1px}
.m-time{font-size:13px;color:var(--t1);white-space:nowrap;flex-shrink:0;font-weight:600;letter-spacing:1px}
.m-arr{font-size:13px;color:var(--t3);flex-shrink:0;transition:transform .2s}.m-arr.open{transform:rotate(180deg)}
.metar-body{display:none;border-top:1px solid var(--b1)}
.metar-body.show{display:block}
.decoded-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 12px}
.dc{background:var(--bg3);border:1px solid var(--b1);border-radius:4px;padding:10px 12px}
.dcl{font-size:10px;color:var(--t3);letter-spacing:2px;margin-bottom:4px}
.dcv{font-size:15px;font-weight:600}.dcs{font-size:10px;color:var(--t3);margin-top:2px}
.hist-wrap{padding:0 16px 14px}
.hist-title{font-size:10px;color:var(--t3);letter-spacing:3px;margin-bottom:8px;padding-top:8px;border-top:1px solid var(--b1)}
.htbl{width:100%;border-collapse:collapse}
.htbl thead th{font-size:10px;color:var(--t3);padding:7px 8px;border-bottom:1px solid var(--b1);background:var(--bg3);text-align:center;font-weight:500;letter-spacing:1px}
.htbl thead th:first-child{text-align:left}.htbl thead th:last-child{text-align:left}
.htbl tbody tr{border-bottom:0.5px solid var(--b1)}
.htbl tbody tr:hover{background:rgba(255,255,255,0.02)}
.htbl tbody tr.lat-row{background:rgba(0,255,179,0.04)}
.htbl tbody td{padding:6px 8px;font-size:11px;color:var(--t1);text-align:center;white-space:nowrap}
.htbl tbody td:first-child{text-align:left;color:var(--t2)}
.htbl tbody td:last-child{text-align:left;color:var(--t3);font-size:10px;word-break:break-all;white-space:normal;max-width:260px}
.metar-stub{padding:14px 16px;font-size:12px;color:var(--t3);letter-spacing:1px}

/* ── BOTTOM BAR ── */
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
.dot{animation:blink 1.2s infinite}.dot:nth-child(2){animation-delay:.3s}.dot:nth-child(3){animation-delay:.6s}
.bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:10px;padding-top:16px;border-top:1px solid var(--b1)}
.bbtns{display:flex;gap:8px;flex-wrap:wrap}
.bbtn{font-family:var(--mono);font-size:11px;padding:8px 18px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;border-radius:var(--radius);letter-spacing:1px;transition:all .15s;font-weight:500}
.bbtn:hover{color:var(--t1);border-color:var(--b3);background:var(--bg3)}
.bbtn.bcsv{border-color:var(--p);color:var(--p)}.bbtn.bcsv:hover{background:var(--pbg)}
.bbtn.bss{border-color:var(--a);color:var(--a)}.bbtn.bss:hover{background:var(--abg)}
.ftime{font-size:11px;color:var(--t3);letter-spacing:1px}

/* ── SNAPSHOTS ── */
.snaps{margin-top:14px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden}
.snaps-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--b1);font-size:11px;color:var(--t3);letter-spacing:3px;background:var(--bg3)}
.snaps-hdr b{color:var(--t2);font-weight:600}
.slist{max-height:150px;overflow-y:auto}
.se{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s}
.se:hover{background:var(--bg3)}.se:last-child{border-bottom:none}
.semeta{font-size:12px;color:var(--t2)}
.stag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;margin-right:6px}
.s8{background:var(--gbg);color:var(--g);border:1px solid var(--gbr)}.s12{background:var(--abg);color:var(--a);border:1px solid var(--abr)}.slive{background:var(--pbg);color:var(--p);border:1px solid var(--pbr)}
.sdel{font-size:11px;color:var(--r);background:none;border:none;cursor:pointer;padding:3px 8px;opacity:.4;font-family:var(--mono)}.sdel:hover{opacity:1}
.sempty{font-size:12px;color:var(--t3);padding:18px;text-align:center;letter-spacing:1px}
.ssov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ssov.show{display:flex}
.ssmsg{font-size:14px;color:var(--g);padding:22px 36px;background:var(--bg2);border:1px solid var(--gbr);border-radius:var(--radius);letter-spacing:2px;box-shadow:0 0 40px rgba(0,255,179,0.1)}
</style>
</head>
<body>
<div class="ssov" id="ssov"><div class="ssmsg" id="ssmsg">capturing...</div></div>
<div class="app" id="app">
<div class="hdr">
  <div class="brand-wrap">
    <svg class="brand-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- thermometer tube -->
      <rect x="18" y="6" width="8" height="24" rx="4" fill="none" stroke="#1a2238" stroke-width="1.5"/>
      <rect x="19.5" y="7.5" width="5" height="21" rx="2.5" fill="#0e1220"/>
      <!-- mercury fill animated -->
      <rect x="19.5" y="17" width="5" height="11.5" rx="1" fill="url(#mercGrad)">
        <animate attributeName="height" values="5;11.5;8;11.5" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="23.5;17;20.5;17" dur="4s" repeatCount="indefinite"/>
      </rect>
      <!-- bulb -->
      <circle cx="22" cy="32" r="6" fill="none" stroke="#1a2238" stroke-width="1.5"/>
      <circle cx="22" cy="32" r="4.5" fill="#00ffb3" opacity="0.9"/>
      <circle cx="22" cy="32" r="2.5" fill="#00ffb3"/>
      <!-- glow -->
      <circle cx="22" cy="32" r="6" fill="#00ffb3" opacity="0.08"/>
      <!-- tick marks -->
      <line x1="26" y1="13" x2="29" y2="13" stroke="#1a2238" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="26" y1="18" x2="28" y2="18" stroke="#1a2238" stroke-width="1" stroke-linecap="round"/>
      <line x1="26" y1="23" x2="29" y2="23" stroke="#1a2238" stroke-width="1.5" stroke-linecap="round"/>
      <defs>
        <linearGradient id="mercGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00ffb3" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#00ffb3"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="brand-text">
      <div class="brand"><span class="tx">TEMPERATURE</span> TOOL<span class="byline">by NIKHIL</span></div>
      <div class="sub">POLYMARKET · MILAN · PARIS · LONDON</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="hdr-clock-row">
      <div class="hdr-clock-line"><span class="clk-lbl">IST</span><span class="clk-val" id="ist">--:--:--</span></div>
      <div class="hdr-clock-line"><span class="clk-lbl">UTC</span><span class="clk-val" id="utc">--:--:--</span></div>
      <div class="hdr-clock-line date-row"><span class="clk-lbl">DATE</span><span class="clk-val" id="hdr-date">--/--/----</span></div>
    </div>
  </div>
</div>
<div class="ctrl">
  <span class="clbl">MODE</span>
  <button class="mbtn on m8" onclick="setMode('8am',this,'m8')">08:00 LOCAL</button>
  <button class="mbtn" onclick="setMode('12pm',this,'m12')">12:00 LOCAL</button>
  <button class="mbtn" onclick="setMode('live',this,'mlive')">LIVE NOW</button>
  <button class="fbtn" id="fbtn" onclick="fetchAll()">▶ FETCH ALL</button>
</div>
<div class="ctabs">
  <button class="ctab am" onclick="setCity('milan',this)">LIMC · MILAN</button>
  <button class="ctab" onclick="setCity('paris',this)">LFPB · PARIS</button>
  <button class="ctab" onclick="setCity('london',this)">EGLC · LONDON</button>
</div>
<div id="panel-milan" class="panel show"></div>
<div id="panel-paris" class="panel"></div>
<div id="panel-london" class="panel"></div>
<div class="bottom">
  <div class="bbtns">
    <button class="bbtn" onclick="saveSnap()">SAVE SNAPSHOT</button>
    <button class="bbtn bcsv" onclick="exportCSV()">EXPORT CSV</button>
    <button class="bbtn bss" onclick="takeShot()">📸 SCREENSHOT PNG</button>
  </div>
  <div class="ftime" id="ftime">— not fetched yet —</div>
</div>
<div class="snaps">
  <div class="snaps-hdr">SNAPSHOTS <b id="scount">0</b></div>
  <div class="slist" id="slist"></div>
</div>
</div>
<script>

// ══════════════════════════════
// METAR — via allorigins proxy (CORS bypass)
// aviationweather.gov blocks direct browser requests
// ══════════════════════════════
// ══════════════════════════════════════════════════════
// METAR DECODE — ICAO Annex 3 / WMO No.49 standard
// ══════════════════════════════════════════════════════
const WX_TABLE={
  // Intensity prefixes handled separately
  // Descriptor
  'MI':'Shallow','PR':'Partial','BC':'Patches','DR':'Low Drifting','BL':'Blowing','SH':'Shower(s)','TS':'Thunderstorm','FZ':'Freezing',
  // Precipitation
  'RA':'Rain','DZ':'Drizzle','SN':'Snow','SG':'Snow Grains','IC':'Ice Crystals','PL':'Ice Pellets','GR':'Hail','GS':'Small Hail','UP':'Unknown Precip',
  // Obscuration
  'FG':'Fog','BR':'Mist','HZ':'Haze','FU':'Smoke','VA':'Volcanic Ash','DU':'Widespread Dust','SA':'Sand','PY':'Spray',
  // Other
  'SQ':'Squall','PO':'Dust/Sand Whirls','DS':'Duststorm','SS':'Sandstorm','FC':'Funnel Cloud/Tornado'
};
const CLOUD_COVER={FEW:'Few (1-2 oktas)',SCT:'Scattered (3-4 oktas)',BKN:'Broken (5-7 oktas)',OVC:'Overcast (8 oktas)',VV:'Vertical Visibility'};
const CLOUD_COVER_SHORT={FEW:'FEW',SCT:'SCT',BKN:'BKN',OVC:'OVC',VV:'VV///'};
const TREND_CODES={NOSIG:'No significant change',BECMG:'Becoming',TEMPO:'Temporary fluctuation'};

function decodeWxCode(code){
  // e.g. -RASN, +TSRA, FZFG, SHRA, TS, BR
  let s=code,intensity='',descriptor='',precip=[],obscur='',other='';
  if(s.startsWith('-')){intensity='Light';s=s.slice(1);}
  else if(s.startsWith('+')){intensity='Heavy';s=s.slice(1);}
  else if(s.startsWith('VC')){intensity='In vicinity';s=s.slice(2);}
  const descs=['MI','PR','BC','DR','BL','SH','TS','FZ'];
  for(const d of descs){if(s.startsWith(d)){descriptor=WX_TABLE[d]||d;s=s.slice(2);break;}}
  const precips=['RA','DZ','SN','SG','IC','PL','GR','GS','UP'];
  while(s.length>=2){
    const p=s.slice(0,2);if(precips.includes(p)){precip.push(WX_TABLE[p]||p);s=s.slice(2);}else break;
  }
  if(s.length>=2){const o=s.slice(0,2);if(WX_TABLE[o]){obscur=WX_TABLE[o];s=s.slice(2);}}
  const others=['SQ','PO','DS','SS','FC'];
  if(s.length>=2&&others.includes(s.slice(0,2))){other=WX_TABLE[s.slice(0,2)]||s.slice(0,2);}
  const parts=[intensity,descriptor,...precip,obscur,other].filter(Boolean);
  return parts.join(' ')||code;
}

function parseMetarLine(raw){
  if(!raw||(!raw.startsWith('METAR')&&!raw.startsWith('SPECI')))return null;
  const r={raw,fields:{}};
  // Type
  r.type=raw.startsWith('SPECI')?'SPECI':'METAR';
  r.fields.type={label:'Report Type',value:r.type,detail:r.type==='SPECI'?'Special observation (significant change)':'Routine scheduled observation',raw:r.type};

  // Station
  const stm=raw.match(/^(?:METAR|SPECI)\s+(?:COR\s+)?([A-Z]{4})\b/);
  if(stm){r.station=stm[1];r.fields.station={label:'Station ICAO',value:stm[1],detail:'ICAO 4-letter aerodrome identifier',raw:stm[1]};}

  // COR
  r.cor=/ COR /.test(raw);
  if(r.cor)r.fields.cor={label:'Correction',value:'COR',detail:'Corrected observation — replaces previous report',raw:'COR'};

  // AUTO
  r.auto=/ AUTO /.test(raw);
  if(r.auto)r.fields.auto={label:'Auto Station',value:'AUTO',detail:'Fully automated station, no human augmentation',raw:'AUTO'};

  // Date/Time
  const dm=raw.match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
  if(dm){r.day=parseInt(dm[1]);r.hour=parseInt(dm[2]);r.min=parseInt(dm[3]);r.timeStr=dm[2]+':'+dm[3]+'Z';
    r.fields.time={label:'Observation Time',value:dm[2]+':'+dm[3]+'Z',detail:`Day ${dm[1]} of month, ${dm[2]}:${dm[3]} UTC`,raw:dm[0]};}

  // Wind — handles MPS too
  const wm=raw.match(/\b(VRB|\d{3})(\d{2,3})(G(\d{2,3}))?(KT|MPS)\b/);
  if(wm){
    r.vrb=wm[1]==='VRB';r.wdir=r.vrb?null:parseInt(wm[1]);
    const unit=wm[5];
    const spd=parseInt(wm[2]);const gst=wm[4]?parseInt(wm[4]):null;
    r.wspdKt=unit==='MPS'?Math.round(spd*1.944):spd;
    r.wgstKt=gst?(unit==='MPS'?Math.round(gst*1.944):gst):null;
    r.wspd=Math.round(r.wspdKt*1.852);r.wgst=r.wgstKt?Math.round(r.wgstKt*1.852):null;
    const bft=r.wspdKt<=1?0:r.wspdKt<=3?1:r.wspdKt<=6?2:r.wspdKt<=10?3:r.wspdKt<=16?4:r.wspdKt<=21?5:r.wspdKt<=27?6:r.wspdKt<=33?7:r.wspdKt<=40?8:r.wspdKt<=47?9:r.wspdKt<=55?10:r.wspdKt<=63?11:12;
    const bftDesc=['Calm','Light air','Light breeze','Gentle breeze','Moderate breeze','Fresh breeze','Strong breeze','Near gale','Gale','Severe gale','Storm','Violent storm','Hurricane'][bft];
    r.fields.wind={label:'Wind',value:(r.vrb?'Variable':dirLabel(r.wdir)+' '+r.wdir+'°')+' '+r.wspd+'km/h'+(r.wgst?' G'+r.wgst+'km/h':''),
      detail:`Direction: ${r.vrb?'Variable (VRB)':dirLabel(r.wdir)+' ('+r.wdir+'°)'}\nSpeed: ${r.wspdKt}kt = ${r.wspd}km/h${r.wgst?'\nGusts: '+r.wgstKt+'kt = '+r.wgst+'km/h':''}\nBeaufort: ${bft} — ${bftDesc}`,raw:wm[0]};}

  // Wind variation
  const wv=raw.match(/\b(\d{3})V(\d{3})\b/);
  if(wv){r.wvar={from:parseInt(wv[1]),to:parseInt(wv[2])};r.fields.wvar={label:'Wind Variable',value:dirLabel(wv[1])+'–'+dirLabel(wv[2]),detail:`Wind varying between ${wv[1]}° (${dirLabel(wv[1])}) and ${wv[2]}° (${dirLabel(wv[2])})`,raw:wv[0]};}

  // Visibility (metres)
  const vm=raw.match(/(?<![\/\d])(\d{4})(?!\d)(?!.*Q\d{4})/);
  if(vm){const v=parseInt(vm[1]);if(v>=0&&v<=9999){r.vis=v;
    const cat=v<200?'RVR only':v<800?'Cat III':v<1500?'Cat II':v<3000?'Cat I':v<5000?'Marginal VFR':'VFR';
    r.fields.vis={label:'Visibility',value:v===9999?'≥10km':v+'m',detail:`Prevailing visibility: ${v===9999?'10km or more':v+'m'}\nFlight category: ${cat}`,raw:vm[0]};}}

  // Visibility (SM — US)
  const vsm=raw.match(/\b(\d+(?:\/\d+)?|\d+\s+\d+\/\d+)SM\b/);
  if(vsm&&!r.vis){r.visSM=vsm[0];r.fields.vis={label:'Visibility',value:vsm[0],detail:`Statute miles (US format): ${vsm[1]} SM`,raw:vsm[0]};}

  // CAVOK
  r.cavok=/\bCAVOK\b/.test(raw);
  if(r.cavok){r.fields.cavok={label:'CAVOK',value:'CAVOK',detail:'Ceiling And Visibility OK:\n• Visibility ≥10km\n• No cloud below 5000ft or MSA\n• No CB or TCU\n• No significant weather',raw:'CAVOK'};}

  // RVR
  const rvr=raw.match(/\bR(\d{2}[LRC]?)\/([PM]?\d{4})(V([PM]?\d{4}))?FT\b/);
  if(rvr){r.fields.rvr={label:'RVR',value:'R'+rvr[1]+'/'+rvr[2]+(rvr[3]||'')+'FT',detail:`Runway Visual Range — Rwy ${rvr[1]}: ${rvr[2]}ft${rvr[4]?' to '+rvr[4]+'ft':''}`,raw:rvr[0]};}

  // Present weather
  const wxTokens=raw.replace(/^.*?Z\s/,'').match(/\b[-+]?(?:VC)?(?:MI|PR|BC|DR|BL|SH|TS|FZ)?(?:RA|DZ|SN|SG|IC|PL|GR|GS|UP|FG|BR|HZ|FU|VA|DU|SA|PY|SQ|PO|DS|SS|FC)+\b/g)||[];
  r.wx=wxTokens.map(t=>decodeWxCode(t));r.wxRaw=wxTokens;
  if(r.wxRaw.length)r.fields.wx={label:'Present Weather',value:r.wx.join('; '),detail:r.wxRaw.map((t,i)=>`${t} → ${r.wx[i]}`).join('\n'),raw:r.wxRaw.join(' ')};

  // Clouds
  const clouds=[];const cre=/\b(FEW|SCT|BKN|OVC|VV)(\d{3})(CB|TCU)?\b/g;let cm;
  while((cm=cre.exec(raw))!==null){
    const baseFt=cm[2]?parseInt(cm[2])*100:null;
    const baseM=baseFt?Math.round(baseFt*0.3048):null;
    clouds.push({cover:cm[1],baseFt,baseM,cb:cm[3]||null});
  }
  r.clouds=clouds;r.clearAbove=/ NCD\b| NSC\b/.test(raw);
  if(clouds.length){
    r.fields.clouds={label:'Cloud Cover',value:clouds.map(c=>c.cover+(c.baseFt?'@'+c.baseFt+'ft':'')).join(' '),
      detail:clouds.map(c=>`${CLOUD_COVER[c.cover]||c.cover} at ${c.baseFt?c.baseFt+'ft ('+c.baseM+'m)':'unknown height'}${c.cb?' — '+c.cb:(c.cover==='BKN'||c.cover==='OVC')?' (ceiling)':''}`).join('\n'),
      raw:clouds.map(c=>c.cover+(c.baseFt?String(parseInt(c.baseFt/100)).padStart(3,'0'):'///')+(c.cb||'')).join(' ')};}
  else if(r.clearAbove){r.fields.clouds={label:'Cloud Cover',value:'NCD/NSC',detail:'No Cloud Detected or No Significant Cloud below 5000ft',raw:'NCD/NSC'};}
  else if(r.cavok){/* already handled */}

  // Temp/Dew
  const tm=raw.match(/\s(M?\d{1,2})\/(M?\d{1,2})\s/);
  if(tm){
    r.temp=parseInt(tm[1].replace('M','-'));r.dew=parseInt(tm[2].replace('M','-'));
    const rh=Math.round(100*Math.exp(17.625*r.dew/(243.04+r.dew))/Math.exp(17.625*r.temp/(243.04+r.temp)));
    const wb=r.temp*Math.atan(0.151977*Math.sqrt(rh+8.313659))+Math.atan(r.temp+rh)-Math.atan(rh-1.676331)+0.00391838*Math.pow(rh,1.5)*Math.atan(0.023101*rh)-4.686035;
    r.rh=rh;
    r.fields.temp={label:'Temp / Dew',value:r.temp+'°C / '+r.dew+'°C',
      detail:`Temperature: ${r.temp}°C\nDew Point: ${r.dew}°C\nRelative Humidity: ~${rh}%\nWet Bulb: ~${wb.toFixed(1)}°C\nSpread: ${(r.temp-r.dew).toFixed(0)}°C ${(r.temp-r.dew)<3?'(fog risk)':''}`,raw:tm[0].trim()};}

  // QNH
  const qm=raw.match(/\bQ(\d{4})\b/);
  if(qm){r.qnh=parseInt(qm[1]);
    const std=1013.25;const dev=r.qnh-std;
    r.fields.qnh={label:'QNH',value:r.qnh+' hPa',detail:`Altimeter setting (QNH): ${r.qnh} hPa\nStandard: 1013.25 hPa\nDeviation: ${dev>0?'+':''}${dev.toFixed(2)} hPa\n${r.qnh<1000?'⚠ Low pressure':r.qnh>1030?'High pressure system':'Normal range'}`,raw:qm[0]};}
  const am=raw.match(/\bA(\d{4})\b/);
  if(am&&!r.qnh){r.altIn=(parseInt(am[1])/100).toFixed(2);const hpa=(parseFloat(r.altIn)*33.8639).toFixed(1);r.fields.qnh={label:'Altimeter',value:r.altIn+'"Hg ('+hpa+' hPa)',detail:`US altimeter setting: ${r.altIn} inHg = ${hpa} hPa`,raw:am[0]};}

  // Trend (BECMG / TEMPO / NOSIG)
  const trem=raw.match(/\b(NOSIG|BECMG|TEMPO)\b(.*?)(?=$)/);
  if(trem){r.fields.trend={label:'Trend',value:trem[1],detail:`${TREND_CODES[trem[1]]||trem[1]}${trem[2]?' — '+trem[2].trim():''}`,raw:trem[0].trim()};}

  return r;
}

function dirLabel(deg){
  if(deg===null||deg===undefined)return 'VRB';
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(deg/22.5)%16];
}
function cloudStr(m){
  if(m.cavok)return 'CAVOK';
  if(m.clearAbove)return 'Clear';
  if(!m.clouds||!m.clouds.length)return '—';
  return m.clouds.map(c=>c.cover+(c.baseFt?'@'+c.baseFt+'ft':'')).join(' ');
}

async function fetchMetar(icao){
  // Try 1: allorigins proxy (most reliable free CORS proxy)
  const awUrl=`https://aviationweather.gov/api/data/metar?ids=${icao}&hours=24&sep=true`;
  const proxies=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(awUrl)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(awUrl)}`,
    `https://proxy.cors.sh/${awUrl}`,
  ];
  let txt='';
  for(const p of proxies){
    try{
      const r=await fetch(p,{signal:AbortSignal.timeout(7000)});
      if(r.ok){txt=await r.text();if(txt&&txt.includes('METAR'))break;}
    }catch(e){continue;}
  }
  if(!txt||!txt.includes('METAR'))throw new Error('All proxies failed');
  const lines=txt.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('METAR')||l.startsWith('SPECI'));
  return lines.map(parseMetarLine).filter(Boolean);
}

function toggleMetar(cid,idx){
  const body=document.getElementById(`mbody-${cid}-${idx}`);
  const arr=document.getElementById(`marr-${cid}-${idx}`);
  if(!body)return;
  const open=body.classList.toggle('show');
  if(arr)arr.classList.toggle('open',open);
}

function renderMetarCard(m,idx,cid,cc,isLatest){
  const windStr=m.fields&&m.fields.wind?m.fields.wind.value:(m.vrb?`VRB ${m.wspd||"—"}km/h`:`${dirLabel(m.wdir)} ${m.wdir||"?"}° ${m.wspd||"—"}km/h`);
  const visStr=m.cavok?"CAVOK":(m.vis?(m.vis===9999?"≥10km":m.vis+"m"):(m.visSM||"—"));
  const tempStr=m.temp!==undefined?m.temp+"°C":"—";
  const wxStr=m.wx&&m.wx.length?m.wx.join(" · "):(m.cavok?"CAVOK":"—");
  const cldStr=m.cavok?"CAVOK":(m.clearAbove?"NCD/NSC":(m.clouds&&m.clouds.length?m.clouds.map(c=>c.cover+(c.baseFt?"@"+c.baseFt+"ft":"")).join(" "):"—"));
  const badgeStyle=m.type==="SPECI"?"background:var(--abg);color:var(--a);border:1px solid var(--abr)":"background:var(--gbg);color:var(--g);border:1px solid var(--gbr)";
  const latestMark=isLatest?`<span style="font-size:7px;padding:1px 5px;background:${cc};color:#000;border-radius:2px;margin-left:4px;font-weight:700">LATEST</span>`:"";
  const fieldOrder=["type","cor","auto","time","wind","wvar","vis","cavok","rvr","wx","clouds","temp","qnh","trend"];
  let detailRows="";
  for(const fk of fieldOrder){
    const f=m.fields&&m.fields[fk];if(!f)continue;
    const detail=f.detail?f.detail.replace(/\n/g,"<br>"):"";
    detailRows+=`<tr>
      <td style="color:var(--t3);font-size:7px;padding:4px 8px;white-space:nowrap;vertical-align:top;border-bottom:0.5px solid var(--b1)">${f.label.toUpperCase()}</td>
      <td style="color:var(--g);font-size:9px;padding:4px 8px;font-weight:600;white-space:nowrap;vertical-align:top;border-bottom:0.5px solid var(--b1)">${f.value}</td>
      <td style="color:var(--t2);font-size:8px;padding:4px 8px;vertical-align:top;border-bottom:0.5px solid var(--b1)">${detail}</td>
      <td style="color:var(--t4);font-size:7px;padding:4px 8px;font-family:var(--mono);vertical-align:top;border-bottom:0.5px solid var(--b1)">${f.raw||""}</td>
    </tr>`;
  }
  const rawClean=m.raw.replace(/^(METAR|SPECI)\s+/,"");
  const bodyOpen=isLatest?" show":"";
  return`<div class="metar-card" style="margin-bottom:4px">
    <div class="metar-hdr" onclick="toggleMetar('${cid}',${idx})">
      <span class="m-badge" style="${badgeStyle}">${m.type||"METAR"}</span>
      ${latestMark}
      <span class="m-time" style="margin-left:4px;font-size:10px;color:var(--t1);font-weight:600">${m.timeStr||"—"}</span>
      <span style="font-size:9px;color:var(--t3);margin:0 5px">·</span>
      <span style="font-size:9px;color:var(--t2)">${tempStr}</span>
      <span style="font-size:9px;color:var(--t3);margin:0 4px">·</span>
      <span style="font-size:9px;color:var(--t2)">${windStr}</span>
      <span style="font-size:9px;color:var(--t3);margin:0 4px">·</span>
      <span style="font-size:9px;color:var(--t2)">${visStr}</span>
      <span style="font-size:9px;color:var(--t3);margin:0 4px">·</span>
      <span style="font-size:9px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${wxStr!=="—"?wxStr:cldStr}</span>
      <span class="m-arr" id="marr-${cid}-${idx}">▾</span>
    </div>
    <div class="metar-body${bodyOpen}" id="mbody-${cid}-${idx}">
      <div style="padding:8px 12px 4px">
        <div style="font-size:7px;color:var(--t3);letter-spacing:2px;margin-bottom:5px">RAW METAR</div>
        <div style="font-size:9px;color:var(--t4);word-break:break-all;line-height:1.6;padding:6px 8px;background:var(--bg);border-radius:2px;border:1px solid var(--b1)">${rawClean}</div>
      </div>
      <div style="padding:4px 12px 10px">
        <div style="font-size:7px;color:var(--t3);letter-spacing:2px;margin-bottom:5px">ICAO DECODE · Annex 3 / WMO No.49</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr>
              <th style="font-size:7px;color:var(--t4);padding:4px 8px;text-align:left;background:var(--bg);border-bottom:1px solid var(--b2);letter-spacing:1px;font-weight:400;white-space:nowrap">FIELD</th>

// ══════════════════════════════
// HOUR SLOTS — FIXED
// 8am mode:  00:00 → 20:00 local (8h before 8am = 00:00, end 20:00) = 21 slots
// 12pm mode: 04:00 → 20:00 local (8h before 12pm = 04:00, end 20:00) = 17 slots
// live:      now → +48h
// ══════════════════════════════
function getHourSlots(cid){
  const city=CITIES[cid];
  const nowLocal=parseInt(new Date().toLocaleTimeString('en-GB',{timeZone:city.tz,hour12:false,hour:'2-digit'}));
  if(mode==='live'){
    const slots=[];
    for(let i=0;i<49;i++){
      const h=(nowLocal+i)%24;const day=Math.floor((nowLocal+i)/24);
      slots.push({localH:h,day,past:false,label:`${String(h).padStart(2,'0')}${day>0?'+'+day+'d':''}`});
    }
    return slots;
  }
  // FIXED: 8am mode = 00:00 to 20:00, 12pm mode = 04:00 to 20:00
  const startH=mode==='8am'?0:4;
  const endH=20;
  const slots=[];
  for(let h=startH;h<=endH;h++){
    // mark as past if hour < current local hour
    slots.push({localH:h,day:0,past:h<nowLocal,label:`${String(h).padStart(2,'0')}:00`});
  }
  return slots;
}

function slotDesc(cid){
  if(mode==='live')return 'LIVE → +48H';
  const city=CITIES[cid];
  const s=mode==='8am'?'00:00':'04:00';
  const ist=mode==='8am'?`IST ${String(((0-city.utcOff+5+48)%24)).padStart(2,'0')}:30`:`IST ${String(((4-city.utcOff+5+48)%24)).padStart(2,'0')}:30`;
  return`${s} → 20:00 LOCAL · ${ist} start`;
}

// VALUE
function getVal(hourly,src,localH,utcOff,day){
  if(!hourly||!hourly.time)return null;
  const tUTC=((localH-utcOff)+48)%24;
  const base=new Date();
  const target=new Date(base);target.setUTCDate(base.getUTCDate()+(day||0));
  const dateStr=target.toISOString().split('T')[0];
  let idx=hourly.time.findIndex(t=>t.startsWith(dateStr)&&parseInt(t.slice(11,13))===tUTC);
  if(idx===-1){const prev=new Date(base);prev.setUTCDate(base.getUTCDate()-1);const ps=prev.toISOString().split('T')[0];idx=hourly.time.findIndex(t=>t.startsWith(ps)&&parseInt(t.slice(11,13))===tUTC);}
  if(idx===-1)return null;
  const arr=hourly[src];if(!arr||arr[idx]===undefined||arr[idx]===null)return null;
  return arr[idx];
}
function fmtVal(raw,v){
  if(raw===null)return null;
  if(v.key==='wdir'){const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return d[Math.round(raw/22.5)%16]+' '+Math.round(raw)+'°';}
  return raw.toFixed(v.dec)+v.unit;
}

// MODEL UPDATE TIME — from open-meteo response metadata
function extractUpdateTime(j,label){
  // open-meteo returns generationtime_ms but not model run time
  // We extract first timestamp in hourly.time which is the analysis time
  if(!j||!j.hourly||!j.hourly.time||!j.hourly.time.length)return null;
  // The model run time is typically in the API metadata
  // Use 'generationtime_ms' + first hourly time as proxy
  return j.hourly.time[0]; // UTC string of first forecast hour = model init time
}

function renderModelUpdates(cid){
  const el=document.getElementById('mupdates-'+cid);if(!el)return;
  const city=CITIES[cid];const d=modelUpdateTimes[cid]||{};
  el.innerHTML=city.models.map(m=>{
    const t=d[m.label];
    if(!t)return`<div class="mu-item"><div class="mu-label">${m.label}</div><div class="mu-time" style="color:var(--t3)">—</div></div>`;
    const dt=new Date(t+'Z');
    const utcHHMM=dt.toISOString().slice(11,16);
    const istH=String((dt.getUTCHours()+5)%24+(dt.getUTCMinutes()+30>=60?1:0)).padStart(2,'0');
    const istM=String((dt.getUTCMinutes()+30)%60).padStart(2,'0');
    const timeStr=`${utcHHMM} UTC (${istH}:${istM} IST)`;
    const nowMs=Date.now();const ageMs=nowMs-dt.getTime();
    const ageH=Math.floor(ageMs/3600000);const ageM=Math.floor((ageMs%3600000)/60000);
    const ageStr=ageH>0?`${ageH}h ${ageM}m ago`:`${ageM}m ago`;
    return`<div class="mu-item"><div class="mu-label">${m.label}</div><div class="mu-time">${timeStr}</div><div class="mu-age">${ageStr}</div></div>`;
  }).join('');
}

function renderForecast(cid){
  const el=document.getElementById('ftbl-'+cid);if(!el)return;
  const city=CITIES[cid];const d=allData[cid]||{};
  const slots=getHourSlots(cid);const v=VARS.find(x=>x.key===activeVar)||VARS[0];
  const ok=Object.values(d).filter(x=>x!==null).length;const total=city.models.length;
  const nowH=parseInt(new Date().toLocaleTimeString('en-GB',{timeZone:city.tz,hour12:false,hour:'2-digit'}));
  const cc=`var(--${city.cc})`;
  const stok=`<span style="color:${ok===total?'var(--g)':ok===0?'var(--r)':'var(--a)'}">${ok===0?'NOT FETCHED':ok+'/'+total+' OK'}</span>`;

  const hdrCells=slots.map(s=>{
    const isCur=s.localH===nowH&&s.day===0;
    return`<th class="${isCur?'cur':''} ${s.past?'past-h':''}" style="${isCur?`color:${cc};border-bottom-color:${cc}`:''}">${s.label}</th>`;
  }).join('');

  let tbl=`<div class="tbl-wrap"><table><thead><tr><th>MODEL</th>${hdrCells}</tr></thead><tbody>`;
  const conV=slots.map(()=>[]);
  city.models.forEach((m,mi)=>{
    const hourly=d[mi]||null;const top=mi===0;
    tbl+=`<tr class="${top?'toprow':''}"><td class="${top?'topmod':''}" style="${top?`color:${cc}`:''}">${m.label}</td>`;
    slots.forEach((s,si)=>{
      const raw=hourly?getVal(hourly,v.src,s.localH,city.utcOff,s.day):null;
      if(raw!==null&&!s.past)conV[si].push(raw);
      const txt=raw!==null?fmtVal(raw,v):null;
      const isCur=s.localH===nowH&&s.day===0;
      tbl+=`<td class="${isCur?'cur':''} ${s.past?'past-v':''}${txt===null?' na':''}">${txt!==null?txt:'—'}</td>`;
    });tbl+=`</tr>`;
  });
  // AVG
  tbl+=`<tr class="avgrow"><td>AVG</td>`;
  slots.forEach((s,si)=>{
    if(s.past){tbl+=`<td class="past-v">—</td>`;return;}
    const vals=conV[si];if(!vals.length){tbl+=`<td>—</td>`;return;}
    if(v.key==='wdir'){
      const sA=vals.reduce((x,a)=>x+Math.sin(a*Math.PI/180),0)/vals.length;
      const cA=vals.reduce((x,a)=>x+Math.cos(a*Math.PI/180),0)/vals.length;
      const avg=(Math.atan2(sA,cA)*180/Math.PI+360)%360;
      const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      tbl+=`<td>${d[Math.round(avg/22.5)%16]} ${Math.round(avg)}°</td>`;
    }else tbl+=`<td>${(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(v.dec)}${v.unit}</td>`;
  });tbl+=`</tr>`;
  if(v.key!=='wdir'){
    tbl+=`<tr class="avgrow"><td>RANGE</td>`;
    slots.forEach((s,si)=>{
      if(s.past){tbl+=`<td class="past-v">—</td>`;return;}
      const vals=conV[si];if(vals.length<2){tbl+=`<td>—</td>`;return;}
      tbl+=`<td>${Math.min(...vals).toFixed(v.dec)}–${Math.max(...vals).toFixed(v.dec)}</td>`;
    });tbl+=`</tr>`;
  }
  tbl+=`</tbody></table></div>`;

  el.innerHTML=`
    <div class="sline">${stok} · ${slotDesc(cid)}</div>
    <div class="vtabs">${VARS.map(vt=>`<button class="vtab ${vt.key===activeVar?'on':''}" onclick="setVar('${vt.key}','${cid}')">${vt.label}</button>`).join('')}</div>
    ${tbl}`;
  renderModelUpdates(cid);
  renderLowHigh(cid);
}

// FETCH
async function fetchModel(city,model){
  const varList=VARS.map(v=>v.src).join(',');
  const base=EP[model.ep];
  const days=mode==='live'?3:2;
  const pastH=mode==='live'?0:10;
  const url=`${base}?latitude=${city.lat}&longitude=${city.lon}&hourly=${varList}&timezone=UTC&forecast_days=${days}&past_hours=${pastH}&models=${model.mp}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(12000)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const j=await r.json();
  if(j.error)throw new Error(j.reason||'API error');
  if(!j.hourly||!j.hourly.time)throw new Error('No hourly');
  return j;// return full response to get metadata
}

// ══════════════════════════════
// LOW / HIGH PREDICTION ENGINE
// ══════════════════════════════
function renderLowHigh(cid){
  const el=document.getElementById('lhbox-'+cid);if(!el)return;
  const city=CITIES[cid];const d=allData[cid]||{};
  const ok=Object.values(d).filter(x=>x!==null).length;
  if(!ok){el.innerHTML=`<div class="lh-box"><div class="lh-na">▶ Fetch karo pehle</div></div>`;return;}

  // Only show for 8am and 12pm modes (not live)
  if(mode==='live'){el.innerHTML=`<div class="lh-box"><div class="lh-na" style="color:var(--t3)">Live mode mein N/A — 08:00 ya 12:00 mode use karo</div></div>`;return;}

  const cc=`var(--${city.cc})`;
  const modeTag=mode==='8am'
    ?`<span class="lh-mode-tag" style="background:var(--gbg);border:1px solid var(--gbr);color:var(--g)">08:00 MODE</span>`
    :`<span class="lh-mode-tag" style="background:var(--abg);border:1px solid var(--abr);color:var(--a)">12:00 MODE</span>`;

  // ── LOW calculation — METAR ONLY ──
  // 8am mode: lowest METAR temp from 00:00–08:00 LOCAL time
  // 12pm mode: lowest METAR temp from 00:00–12:00 LOCAL time
  const lowEndH = mode==='8am' ? 8 : 12;
  const todayDD = new Date().getUTCDate();

  let metarLow=null, metarLowTime='';
  const metarArr=metarData[cid];
  if(Array.isArray(metarArr)){
    metarArr.forEach(m=>{
      if(!m||m.temp===undefined||m.temp===null)return;
      if(m.day!==todayDD)return;
      // m.hour is UTC — convert to local: localH = (utcHour + utcOff) % 24
      const localH=(m.hour + city.utcOff + 24) % 24;
      // We want METARs from local 00:00 up to lowEndH
      // Edge case: if localH > 20 it's previous day's late evening, skip
      if(localH <= lowEndH && localH >= 0){
        if(metarLow===null || m.temp < metarLow){
          metarLow = m.temp;
          metarLowTime = m.timeStr||'';
        }
      }
    });
  }

  // Final LOW: METAR only — if no METAR data yet, show waiting message
  let lowVal=null, lowSrc='';
  if(metarLow!==null){
    lowVal = metarLow;
    lowSrc = `METAR observed${metarLowTime?' · '+metarLowTime:''}`;
  }

  // ── HIGH calculation ──
  // For both modes: scan 08:00 to 17:00 (peak heat window)
  // Use weighted avg: models that agree closely get more weight (lower spread = higher conf)
  const highStartH=mode==='8am'?8:12;
  const highEndH=18;
  const modelPeaks=[];
  city.models.forEach((m,mi)=>{
    const hourly=d[mi];if(!hourly)return;
    const peaks=[];
    for(let h=highStartH;h<=highEndH;h++){
      const v=getVal(hourly,'temperature_2m',h,city.utcOff,0);
      if(v!==null)peaks.push(v);
    }
    if(peaks.length)modelPeaks.push(Math.max(...peaks));
  });

  let highVal=null,highSrc='',highConf='',confStyle='';
  if(modelPeaks.length){
    const avg=modelPeaks.reduce((a,b)=>a+b,0)/modelPeaks.length;
    const mx=Math.max(...modelPeaks);
    const mn=Math.min(...modelPeaks);
    const spread=mx-mn;
    // trim outliers: remove values > 1.5*IQR from median for better estimate
    const sorted=[...modelPeaks].sort((a,b)=>a-b);
    const q1=sorted[Math.floor(sorted.length*0.25)];
    const q3=sorted[Math.ceil(sorted.length*0.75)-1]||sorted[sorted.length-1];
    const iqr=q3-q1;
    const filtered=modelPeaks.filter(v=>v>=q1-1.5*iqr&&v<=q3+1.5*iqr);
    const filtAvg=filtered.length?filtered.reduce((a,b)=>a+b,0)/filtered.length:avg;
    // blend: 70% filtered avg + 30% simple avg (slight upward bias for high)
    highVal=filtAvg*0.7+avg*0.3;
    highSrc=`${modelPeaks.length} model${modelPeaks.length>1?'s':''} · range ${mn.toFixed(1)}–${mx.toFixed(1)}°C`;
    // Confidence based on spread
    if(spread<=1.0){highConf='HIGH';confStyle='background:var(--gbg);border:1px solid var(--gbr);color:var(--g)';}
    else if(spread<=2.5){highConf='MED';confStyle='background:var(--abg);border:1px solid var(--abr);color:var(--a)';}
    else{highConf='LOW';confStyle='background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.3);color:var(--r)';}
  }

  // ── Render ──
  const lowCC=mode==='8am'?'var(--p)':'var(--g)';

  el.innerHTML=`<div class="lh-box">
    <div class="lh-hdr">TODAY'S TEMPERATURE ESTIMATE${modeTag}</div>
    <div class="lh-grid">
      <div class="lh-cell">
        <div class="lh-label">${mode==='8am'?'FORECAST LOW · 00:00–08:00':'OBSERVED LOW · till 12:00'}</div>
        ${lowVal!==null
          ?`<div class="lh-val" style="color:${lowCC}">${lowVal.toFixed(1)}<span class="lh-unit">°C</span></div>
             <div class="lh-sub">${lowSrc}<span class="lh-metar-badge">METAR ✓</span></div>
             <span class="lh-conf" style="background:var(--gbg);border:1px solid var(--gbr);color:var(--g)">OBSERVED</span>`
          :`<div class="lh-na" style="color:var(--t3)">METAR data nahi mila abhi</div>`}
      </div>
      <div class="lh-cell">
        <div class="lh-label">FORECAST HIGH · ${highStartH}:00–18:00</div>
        ${highVal!==null
          ?`<div class="lh-val" style="color:var(--a)">${highVal.toFixed(1)}<span class="lh-unit">°C</span></div>
             <div class="lh-sub">${highSrc}</div>
             ${highConf?`<span class="lh-conf" style="${confStyle}">CONF: ${highConf}</span>`:''}`
          :`<div class="lh-na">Data nahi mila</div>`}
      </div>
    </div>
  </div>`;
}

  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');

    // 4. Restore
    hiddenEls.forEach(el=>el.style.display='');
    hiddenCells.forEach(el=>el.style.display='');

    // 5. Download
    const fname=`TTbNikhil - ${dateStamp} (${timeStamp}) - ${mn} - ${cityName}.png`;
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);

    msg.textContent=`✓ Saved: ${fname}`;
    setTimeout(()=>ov.classList.remove('show'),2500);

  }catch(e){
    hiddenEls.forEach(el=>el.style.display='');
    hiddenCells.forEach(el=>el.style.display='');
    msg.textContent='❌ Error: '+e.message;
    setTimeout(()=>ov.classList.remove('show'),3000);
  }
}
function saveSnap(){
  if(!Object.keys(allData).length){alert('Pehle FETCH ALL dabao!');return;}
  const s={id:Date.now(),time:new Date().toISOString(),mode,data:JSON.parse(JSON.stringify(allData)),metar:JSON.parse(JSON.stringify(metarData)),updates:JSON.parse(JSON.stringify(modelUpdateTimes))};
  snaps.unshift(s);if(snaps.length>30)snaps=snaps.slice(0,30);
  try{localStorage.setItem('wxt_v13',JSON.stringify(snaps));}catch(e){}renderSnaps();
}
function delSnap(id,e){e.stopPropagation();snaps=snaps.filter(s=>s.id!==id);try{localStorage.setItem('wxt_v13',JSON.stringify(snaps));}catch(e){}renderSnaps();}
function loadSnap(id){
  const s=snaps.find(x=>x.id===id);if(!s)return;
  allData=JSON.parse(JSON.stringify(s.data));metarData=JSON.parse(JSON.stringify(s.metar||{}));modelUpdateTimes=JSON.parse(JSON.stringify(s.updates||{}));
  mode=s.mode;document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('on','m8','m12','mlive'));
  const mi=['8am','12pm','live'].indexOf(s.mode);if(mi>=0)document.querySelectorAll('.mbtn')[mi].classList.add('on',['m8','m12','mlive'][mi]);
  renderAll();document.getElementById('ftime').textContent='Snapshot: '+new Date(s.time).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour12:true});
}
function renderSnaps(){
  const el=document.getElementById('slist');document.getElementById('scount').textContent=snaps.length;
  if(!snaps.length){el.innerHTML='<div class="sempty">— no snapshots —</div>';return;}
  el.innerHTML=snaps.map(s=>{
    const dt=new Date(s.time).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour12:true,month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const tc=s.mode==='8am'?'s8':s.mode==='12pm'?'s12':'slive';const tl=s.mode==='8am'?'08:00':s.mode==='12pm'?'12:00':'LIVE';
    return`<div class="se" onclick="loadSnap(${s.id})"><span class="semeta"><span class="stag ${tc}">${tl}</span>${dt} IST</span><button class="sdel" onclick="delSnap(${s.id},event)">DEL</button></div>`;
  }).join('');
}
function exportCSV(){
  if(!Object.keys(allData).length){alert('Pehle FETCH ALL dabao!');return;}
  const date=new Date().toISOString().split('T')[0];const mn=mode==='8am'?'8AM':mode==='12pm'?'12PM':'LIVE';
  let csv=`WX/TRADE — ${mn} — ${date}\n\n`;
  Object.entries(CITIES).forEach(([cid,city])=>{
    const d=allData[cid]||{};const slots=getHourSlots(cid);
    csv+=`\n=== ${city.iata} — ${city.name} ===\n${city.loc}\n${slotDesc(cid)}\n\n`;
    VARS.forEach(v=>{
      csv+=`${v.label}(${v.unit})\nModel,`+slots.map(s=>s.label).join(',')+'\n';
      city.models.forEach((m,mi)=>{
        const hourly=d[mi]||null;
        csv+=`${m.label},`+slots.map(s=>{if(!hourly)return'N/A';const r=getVal(hourly,v.src,s.localH,city.utcOff,s.day);return r!==null?r.toFixed(v.dec):'N/A';}).join(',')+'\n';
      });csv+='\n';
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`WX_${mn}_${date}.csv`;a.click();
}
renderAll();renderSnaps();
</script>
